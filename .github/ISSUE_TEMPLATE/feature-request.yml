name: "✨ 功能请求"
description: "提交新功能建议（固定格式）"
title: "[Feature] "
labels:
  - "type: feature"
body:
  - type: markdown
    attributes:
      value: |
        请按模板完整描述需求背景和预期收益，避免仅写一句“希望支持 xxx”。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，确认不是重复需求
          required: true
        - label: 我确认该能力当前版本尚未提供
          required: true
        - label: 我已使用规范标题（以 [Feature] 开头）
          required: true

  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 当前遇到什么问题，为什么需要这个功能。
      placeholder: "请描述现状痛点和使用场景"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望系统新增或调整的能力。
      placeholder: |
        例如：
        - 新增 ...
        - 在 ... 页面支持 ...
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 价值与影响
      description: 该需求能带来的收益（效率、稳定性、体验等）。
      placeholder: "说明对你或团队的价值"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你尝试过的替代方案或临时方案（可选）。

  - type: textarea
    id: references
    attributes:
      label: 参考资料
      description: 可附原型、截图、竞品链接、技术资料等（可选）。
