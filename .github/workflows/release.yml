name: Release

# 手动触发的唯一发版入口：填一个版本号，工作流会
#   1. 把版本号写进所有可发布包的 package.json（scripts/version.mjs）；
#   2. 提交这次改动并推回当前分支，然后打上 v<版本号> 的 tag 并推送；
#   3. 用该版本号构建 backend / frontend 镜像并推送到 ghcr.io 与 Docker Hub；
#   4. 发布 GitHub Release。
#
# 这是仓库里唯一会构建并推送 Docker 镜像的工作流——push 到 main 不再自动打包。

on:
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号，例如 1.2.3 或 1.3.0-rc.1（可带前导 v）"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      published_at: ${{ steps.bump.outputs.published_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply version to files
        id: version
        run: node scripts/version.mjs apply "${{ inputs.version }}"

      # 纯 JS 的 global 版本是从 verhub-sdk.js 生成的，版本号改了要一并重生成。
      - name: Rebuild vanilla-js global bundle
        run: node sdk/vanilla-js/build.mjs

      - name: Commit, tag and push
        id: bump
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # tag 已存在说明这个版本发过了，直接失败而不是覆盖历史
          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG 已存在于远端，请换一个新版本号"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 版本号真源与所有跟随文件，与 scripts/version.mjs 的目标清单保持一致
          git add package.json packages/backend/package.json packages/ui/package.json \
                  web/package.json doc/package.json \
                  sdk/typescript/package.json sdk/typescript/src/version.ts \
                  sdk/vanilla-js/package.json sdk/vanilla-js/verhub-sdk.js \
                  sdk/vanilla-js/verhub-sdk.global.js \
                  sdk/python/verhub_sdk/_version.py \
                  sdk/rust/Cargo.toml sdk/rust/src/lib.rs
          git commit -m "chore(release): $TAG"
          git tag "$TAG"

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "refs/tags/$TAG"

          echo "published_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  # 构建并推送刚刚打好的 tag 对应的镜像
  docker:
    needs: bump
    environment:
      name: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: "-backend"
            dockerfile: docker/backend.Dockerfile
            description: backend
          - image_suffix: "-frontend"
            dockerfile: docker/frontend.Dockerfile
            description: frontend

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 兜底：确认 tag 上的代码版本号与 tag 本身一致
      - name: Verify version matches tag
        run: node scripts/version.mjs check "${{ needs.bump.outputs.tag }}"

      - name: Prepare image names
        id: image
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.image.outputs.repo_lc }}${{ matrix.image_suffix }}
            docker.io/ivanhanloth/verhub${{ matrix.image_suffix }}
          # 预发布版本不占用 latest
          tags: |
            type=raw,value=${{ needs.bump.outputs.tag }}
            type=raw,value=${{ needs.bump.outputs.version }}
            type=raw,value=latest,enable=${{ needs.bump.outputs.is_prerelease == 'false' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 关于页面显示的版本号来自这两个 build arg 写出的 build-info.json
          build-args: |
            VERHUB_BUILD_VERSION=${{ needs.bump.outputs.version }}
            VERHUB_BUILD_PUBLISHED_AT=${{ needs.bump.outputs.published_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 各语言 SDK 发布到对应包管理平台 ----
  # 三者都 checkout 刚打好的 tag，跑一遍 version check 兜底，再构建并发布。
  # 用 sdk-publish 这个 environment 收口密钥，可在仓库设置里加保护规则。

  publish-python:
    needs: bump
    runs-on: ubuntu-latest
    environment: sdk-publish
    permissions:
      contents: read
      # PyPI Trusted Publishing 走 OIDC；若改用 API Token 可删掉本行。
      id-token: write
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Verify version matches tag
        working-directory: .
        run: node scripts/version.mjs check "${{ needs.bump.outputs.tag }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          # Trusted Publishing 下无需 password；若用 API Token，取消下一行注释：
          # password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    needs: bump
    runs-on: ubuntu-latest
    environment: sdk-publish
    permissions:
      contents: read
      # npm 发布带 provenance 需要 OIDC。
      id-token: write
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify version matches tag
        working-directory: .
        run: node scripts/version.mjs check "${{ needs.bump.outputs.tag }}"

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-rust:
    needs: bump
    runs-on: ubuntu-latest
    environment: sdk-publish
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Verify version matches tag
        working-directory: .
        run: node scripts/version.mjs check "${{ needs.bump.outputs.tag }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [bump, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump.outputs.tag }}
          PRERELEASE: ${{ needs.bump.outputs.is_prerelease }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            $([ "$PRERELEASE" = "true" ] && echo --prerelease)
