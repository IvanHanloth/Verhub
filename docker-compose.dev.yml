# Development stack with hot reload.
#
# Sources are bind-mounted into the dev image stages, which already contain
# installed node_modules. Only source directories are mounted — never a
# node_modules path — so the host's platform-specific installs (and pnpm's
# absolute symlinks) never leak into the Linux containers.
#
#   docker compose -f docker-compose.dev.yml up -d --build
name: verhub

networks:
  verhub-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: verhub-postgres
    restart: unless-stopped
    networks:
      - verhub-net
    environment:
      POSTGRES_DB: ${VERHUB_POSTGRES_DB:-verhub}
      POSTGRES_USER: ${VERHUB_POSTGRES_USER:-verhub}
      POSTGRES_PASSWORD: ${VERHUB_POSTGRES_PASSWORD}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${VERHUB_POSTGRES_USER:-verhub} -d ${VERHUB_POSTGRES_DB:-verhub}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Exposed on the host for psql / Prisma Studio during development only.
    ports:
      - "${VERHUB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "20m" # 单个日志文件最大 20MB
        max-file: "3" # 最多保留 3 个旧文件

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: backend-dev
    image: ${VERHUB_BACKEND_IMAGE:-verhub-backend-dev}:${VERHUB_TAG:-dev}
    pull_policy: never
    container_name: verhub-backend
    restart: unless-stopped
    networks:
      - verhub-net
    environment:
      NODE_ENV: development
      PORT: 4000
      # Bind mounts from a Windows/macOS host do not deliver inotify events into
      # the container, so tsc's watcher must poll instead.
      TSC_WATCHFILE: PriorityPollingInterval
      TSC_WATCHDIRECTORY: DynamicPriorityPolling
      DATABASE_URL: postgresql://${VERHUB_POSTGRES_USER:-verhub}:${VERHUB_POSTGRES_PASSWORD}@postgres:5432/${VERHUB_POSTGRES_DB:-verhub}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BOOTSTRAP_SECRET_DIR: /bootstrap
      API_KEY_SALT: ${API_KEY_SALT}
      # 客户端 IP 识别：套 CDN 时改成 2（CDN + 自带 nginx 各一层），见
      # doc/guide/deployment.md
      VERHUB_TRUSTED_PROXY_COUNT: ${VERHUB_TRUSTED_PROXY_COUNT:-1}
      VERHUB_CLIENT_IP_HEADER: ${VERHUB_CLIENT_IP_HEADER:-}
      # 来源地区解析与上报去重，见 doc/guide/deployment.md
      VERHUB_GEO_ENABLED: ${VERHUB_GEO_ENABLED:-true}
      VERHUB_GEO_PROVIDERS: ${VERHUB_GEO_PROVIDERS:-}
      VERHUB_GEO_TTL_DAYS: ${VERHUB_GEO_TTL_DAYS:-30}
      VERHUB_GEO_TIMEOUT_MS: ${VERHUB_GEO_TIMEOUT_MS:-2500}
      VERHUB_DEDUP_WINDOW_SECONDS: ${VERHUB_DEDUP_WINDOW_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    volumes:
      - bootstrap-secrets:/bootstrap
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
    logging: *default-logging # 引用日志配置

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: frontend-dev
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    image: ${VERHUB_FRONTEND_IMAGE:-verhub-frontend-dev}:${VERHUB_TAG:-dev}
    pull_policy: never
    container_name: verhub-frontend
    restart: unless-stopped
    networks:
      - verhub-net
    environment:
      NODE_ENV: development
      # Same reason as the backend: poll the bind mount instead of relying on
      # inotify events that never arrive.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1/healthz || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports:
      - "${VERHUB_HTTP_PORT:-80}:80"
      - "${VERHUB_HTTPS_PORT:-443}:443"
    volumes:
      - ./web/app:/app/web/app
      - ./web/components:/app/web/components
      - ./web/hooks:/app/web/hooks
      - ./web/lib:/app/web/lib
      - ./web/public:/app/web/public
      - ./packages/ui/src:/app/packages/ui/src
    logging: *default-logging # 引用日志配置

volumes:
  postgres-data:
  bootstrap-secrets:
