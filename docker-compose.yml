services:
  db:
    image: postgres:16-alpine
    container_name: verhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verhub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - verhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: migrator
    container_name: verhub-migrate
    restart: "no"
    command: ["pnpm", "--filter", "@workspace/backend", "exec", "prisma", "db", "push"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-verhub}?schema=public
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime
    container_name: verhub-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-verhub}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      API_KEY_SALT: ${API_KEY_SALT:?API_KEY_SALT is required}
      BOOTSTRAP_SECRET_DIR: ${BOOTSTRAP_SECRET_DIR:-/bootstrap}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - verhub-bootstrap-secrets:/bootstrap
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/api/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: runtime
    container_name: verhub-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 25s

volumes:
  verhub-postgres-data:
  verhub-bootstrap-secrets:
