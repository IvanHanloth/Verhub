# 套 CDN 时 $remote_addr 是边缘节点地址，不能拿它盖掉上游已给出的真实客户端
# 地址；只有直接对外（无 CDN）时才由本机填。X-Forwarded-For 用 $proxy_add_x_
# forwarded_for 追加而非覆盖，后端按可信层数从右往左定位访客。
map $http_x_real_ip $verhub_real_ip {
    ""      $remote_addr;
    default $http_x_real_ip;
}

upstream frontend_node {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream backend_api {
    server backend:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $verhub_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_pass http://backend_api;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $verhub_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://frontend_node;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $verhub_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_pass http://backend_api;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $verhub_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_pass http://frontend_node;
    }
}
