      example:
        secret: whsec_5b1c9e0f8d2a47b6c3e18f04a7d95c2be6134af80d5e7cb9

    GithubReleaseEventPayload:
      type: object
      description: |
        GitHub `release` 事件负载，字段与 GitHub REST Release 资源一致。
        此处只列出会被读取的字段，其余字段原样忽略。
      properties:
        action:
          type: string
          description: 事件动作
          enum: [published, released, prereleased, created, edited, deleted, unpublished]
        release:
          type: object
          properties:
            tag_name:
              type: string
              description: Git tag，前缀 `v` 会被去除后作为版本号
            name:
              type: string
              description: Release 标题，超过 128 字符会被截断
            body:
              type: string
              description: Release 说明，超过 4096 字符会被截断
            draft:
              type: boolean
              description: 草稿 release 会被跳过
            prerelease:
              type: boolean
              description: 为 true 时写入 is_preview 且不会占用 is_latest
            published_at:
              type: string
              format: date-time
            html_url:
              type: string
              format: uri
            zipball_url:
              type: string
              format: uri
            assets:
              type: array
              description: 附件列表，最多取前 32 个作为 download_links
              items:
                type: object
                properties:
                  name:
                    type: string
                  browser_download_url:
                    type: string
                    format: uri
        repository:
          type: object
          properties:
            full_name:
              type: string
      example:
        action: published
        release:
          tag_name: v1.4.0
          name: Verhub 1.4.0
          body: 新增 GitHub Release Webhook 同步
          draft: false
          prerelease: false
          published_at: "2026-07-21T10:00:00Z"
          html_url: https://github.com/example/verhub/releases/tag/v1.4.0
          assets:
            - name: verhub-1.4.0-win-x64.zip
              browser_download_url: https://github.com/example/verhub/releases/download/v1.4.0/verhub-1.4.0-win-x64.zip
        repository:
          full_name: example/verhub

    GithubWebhookDeliveryResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [synced, ignored, pong]
          description: synced 表示已写入版本，ignored 表示按规则跳过，pong 为 ping 事件应答
        reason:
          type: string
          enum:
            [
              unsupported_event,
              unsupported_action,
              missing_release,
              draft_release,
              missing_tag,
              unparsable_version,
            ]
          description: 仅在 status 为 ignored 时返回
        event:
          type: string
        action:
          type: string
        version:
          type: string
        created:
          type: boolean
          description: true 表示新建版本，false 表示覆盖了已有版本
      example:
        status: synced
        event: release
        action: published
        version: 1.4.0
        created: true

