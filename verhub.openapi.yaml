openapi: 3.1.0
info:
  title: Verhub API
  version: 1.2.0
  description: |
    Verhub 后端接口契约（与当前 NestJS Controller + DTO 保持一致）。
    基础路径统一为 /api/v1。

servers:
  - url: /api/v1
    description: 默认 API 前缀

tags:
  - name: Health
  - name: Auth
  - name: Projects
  - name: Versions
  - name: Announcements
  - name: Feedbacks
  - name: Logs
  - name: Actions
  - name: Statistics
  - name: Webhooks

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "201":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/status:
    get:
      tags: [Auth]
      summary: Auth 模块状态
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前管理员信息
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/admin-profile:
    get:
      tags: [Auth]
      summary: 获取管理员资料
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: 更新管理员资料
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminProfileDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password:
    patch:
      tags: [Auth]
      summary: 修改管理员密码
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/account:
    patch:
      tags: [Auth]
      summary: 修改管理员账号（用户名）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminAccountDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: 用户名冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-scopes:
    get:
      tags: [Auth]
      summary: 获取可用的 API 作用域列表
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 获取可用作用域列表及默认值
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApiScopesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/tokens:
    get:
      tags: [Auth]
      summary: 获取长期 Token 列表
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiTokenItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: 创建长期 Token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/api-keys:
    get:
      tags: [Auth]
      summary: 获取长期 Token 列表（包装响应）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokenListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: 创建长期 Token（包装响应）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/tokens/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [Auth]
      summary: 在线更新长期 Token（权限/范围/有效期，token 值不变）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiTokenDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Auth]
      summary: 撤销长期 Token
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/tokens/{id}/rotate:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [Auth]
      summary: 轮转长期 Token（支持旧 token 宽限期）
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [Auth]
      summary: 在线更新长期 Token（包装响应，token 值不变）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiTokenDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Auth]
      summary: 撤销长期 Token（包装响应）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/api-keys/{id}/rotate:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [Auth]
      summary: 轮转长期 Token（包装响应，支持旧 token 宽限期）
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects:
    get:
      tags: [Projects]
      summary: 获取项目列表
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: "创建项目"
      description: "创建新的项目元数据。"
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: project_key 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/statistics:
    get:
      tags: [Projects]
      summary: 获取项目统计信息
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/github-repo-preview:
    get:
      tags: [Projects]
      summary: 从 GitHub 仓库地址预览项目信息
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: repo_url
          in: query
          required: true
          schema:
            type: string
            format: uri
            maxLength: 512
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubRepoProjectPreview"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    get:
      tags: [Projects]
      summary: 获取单个项目
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: 更新项目
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: project_key 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Projects]
      summary: "删除项目"
      description: "删除项目及其关联管理数据。"
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}/github-webhook:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    get:
      tags: [Webhooks]
      summary: "查询 GitHub Release Webhook 配置"
      description: |
        返回该项目的 GitHub Release Webhook 配置状态与需要填入 GitHub 的 Payload 路径。
        出于安全考虑只返回 secret 末 4 位提示，完整 secret 仅在设置或重新生成时返回一次。
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWebhookSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Webhooks]
      summary: "设置 GitHub Release Webhook Secret"
      description: |
        手动填入 secret，用于仓库上已经配置好 webhook 的场景。
        完整 secret 在本次响应中返回，之后不再可读。
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetGithubWebhookSecretDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWebhookSecretRevealed"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Webhooks]
      summary: "清除 GitHub Release Webhook Secret"
      description: "清除后该项目的 webhook 接收端点会拒绝所有推送。"
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWebhookSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}/github-webhook/regenerate:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    post:
      tags: [Webhooks]
      summary: "重新生成 GitHub Release Webhook Secret"
      description: |
        生成一个新的随机 secret 并覆盖原值，完整 secret 仅在本次响应中返回一次。
        旧 secret 立即失效，需要同步更新 GitHub 仓库上的 webhook 配置。
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWebhookSecretRevealed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /webhooks/github/{projectKey}:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    post:
      tags: [Webhooks]
      summary: "接收 GitHub Release Webhook 推送"
      description: |
        供 GitHub 仓库 Webhook 直接调用，不使用管理员 JWT 或 API Key，
        唯一凭据是项目上配置的 secret（`X-Hub-Signature-256` HMAC-SHA256 校验）。

        - 仅处理 `release` 事件的 `published` / `released` / `prereleased` / `created` / `edited` 动作
        - `deleted` / `unpublished` 不会删除已有版本，需人工在后台处理
        - 草稿（draft）release、无法解析为可比较版本号的 tag 会被跳过并返回 `ignored`
        - 版本号已存在时按 GitHub 推送内容覆盖，不存在时创建
        - 直接使用推送 payload 中的 release 数据，不再回查 GitHub API
      x-verhub-doc: true
      security:
        - GithubSignatureAuth: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          description: GitHub 事件名，仅 `release` 会触发同步，`ping` 返回 pong
          example: release
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: false
          description: GitHub 投递 ID，仅用于日志关联
          schema:
            type: string
      requestBody:
        required: true
        description: GitHub release 事件原始负载
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubReleaseEventPayload"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubWebhookDeliveryResult"
        "401":
          description: 签名缺失或校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 项目未配置 webhook secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/_status:
    get:
      tags: [Projects]
      summary: Projects 模块状态
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/{projectKey}/versions:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    get:
      tags: [Versions]
      summary: 获取版本列表
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Versions]
      summary: "创建版本"
      description: "为指定项目新增版本。"
      x-verhub-doc: true
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 同项目 version 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/{projectKey}/versions/github-release-preview:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    get:
      tags: [Versions]
      summary: 从 GitHub Release 预填版本草稿
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubReleaseVersionPreview"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}/versions/github-release-import:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
    post:
      tags: [Versions]
      summary: 从 GitHub Release 导入历史版本
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}/versions/by-version/{version}:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
      - name: version
        in: path
        required: true
        description: 目标版本号，按 version 字段精确匹配
        schema:
          type: string
          maxLength: 64
    put:
      tags: [Versions]
      summary: 按版本号创建或更新版本（支持管理员 JWT 或 API Key）
      description: >
        幂等发布端点：项目下不存在该版本号时创建，已存在则就地更新，
        调用方无需先查出版本 id。API Key 需要 `versions:write` scope。
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVersionDto"
      responses:
        "200":
          description: 已有版本被更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "201":
          description: 版本被创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectKey}/versions/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectKeyByPath"
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Versions]
      summary: 获取单个版本
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Versions]
      summary: "更新版本"
