                $ref: "#/components/schemas/StatPlatform"
              count:
                type: integer
        by_region:
          type: array
          description: 按地区汇总。地区解析尚未实现，当前恒为单个 UNKNOWN 分组。
          items:
            type: object
            required: [region, count]
            properties:
              region:
                type: string
              count:
                type: integer
      example:
        start_time: 1760000000
        end_time: 1762000000
        total: 12840
        by_endpoint:
          - endpoint: VERSION_CHECK_UPDATE
            count: 8210
