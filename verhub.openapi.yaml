components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Authorization: Bearer <凭据>。管理员 JWT（POST /auth/login 获取，默认 2 小时过期）
        与 API Key（vh_ 前缀，长期有效）在所有 /admin/* 接口上等价，任一有效即放行；
        服务端按凭据形态自动识别。/auth/* 下的凭据管理接口只接受管理员 JWT。
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        传 API Key 的兼容别名，等价于把同一个 Key 放进 Authorization: Bearer；
        新接入建议统一用 BearerAuth。API Key 按 scope 授权：读接口需要 <资源>:read，
        写接口需要 <资源>:write，写权限不隐含读权限；资源为 projects / versions /
        announcements / feedbacks / logs / actions，另有 stats:read 用于请求统计接口。
        scope 或项目范围不匹配返回 401。
    GithubSignatureAuth:
      type: apiKey
      in: header
      name: X-Hub-Signature-256
      description: >
        GitHub Webhook 的 HMAC-SHA256 签名，形如 sha256=<hex>，密钥是项目上配置的
        webhook secret。签名覆盖请求体原始字节，服务端按原样字节重算比对，
        因此代理层不得改写请求体。这是 webhook 接收端点唯一的凭据，
        不接受管理员 JWT 或 API Key。

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: 分页大小
      example: 20
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      description: 分页偏移
      example: 0
      schema:
        type: integer
        minimum: 0
        default: 0
    ProjectKeyByPath:
      name: projectKey
      in: path
      required: true
      description: 项目主键 project_key（大小写不敏感）
      example: verhub
      schema:
        type: string
    ClientPlatformHeader:
      name: x-verhub-platform
      in: header
      required: false
      description: |
        客户端平台声明，仅用于请求统计，不影响接口返回内容。
        识别优先级：本请求头 > query 参数 `platform` > 请求体 `platform` 字段 > User-Agent 推断。
        取值大小写不敏感，无法识别时统计为 UNKNOWN。
        建议 SDK 显式声明本请求头：服务端调用的 User-Agent 往往不可靠。
      example: windows
      schema:
        type: string
        enum: [ios, ipados, android, windows, win32, mac, macos, darwin, web, browser]
    ClientPlatformQuery:
      name: platform
      in: query
      required: false
      description: |
        客户端平台声明（等价于 `x-verhub-platform` 请求头，优先级低于请求头）。
        仅用于请求统计，不影响接口返回内容。
      schema:
        type: string
        enum: [ios, ipados, android, windows, win32, mac, macos, darwin, web, browser]
    EntityId:
      name: id
      in: path
      required: true
      description: 记录主键 id
      example: ver-001
      schema:
        type: string
    StartTime:
      name: start_time
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Unix 时间戳（秒）
      example: 1760000000
    EndTime:
      name: end_time
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Unix 时间戳（秒）
      example: 1762000000
    LogLevel:
      name: level
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 3
      description: 0=debug, 1=info, 2=warn, 3=error

  responses:
    Unauthorized:
      description: 未认证或令牌非法
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ModuleStatusResponse:
      type: object
      required: [module, implemented]
      properties:
        module:
          type: string
        implemented:
          type: boolean
      example:
        module: versions
        implemented: true

    DeleteSuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
      example:
        success: true

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: integer
          format: int64
      example:
        status: ok
        timestamp: 1760000000

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string

    LoginDto:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 64
        password:
          type: string
          minLength: 6
          maxLength: 128

    LoginResponse:
      type: object
      required: [access_token, expires_in, user]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          description: JWT 剩余秒数
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, username, role, must_change_password]
      properties:
        id:
          type: string
        username:
          type: string
          maxLength: 64
        role:
          type: string
          enum: [ADMIN]
        must_change_password:
          type: boolean

    AdminProfileResponse:
      $ref: "#/components/schemas/AuthUser"

    UpdateAdminProfileDto:
      type: object
      required: [current_password]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        username:
          type: string
          maxLength: 64
        new_password:
          type: string
          minLength: 6
          maxLength: 128

    ChangePasswordDto:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        new_password:
          type: string
          minLength: 6
          maxLength: 128

    UpdateAdminAccountDto:
      type: object
      required: [current_password, username]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        username:
          type: string
          maxLength: 64

    CreateApiTokenDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64
        scopes:
          type: array
          items:
            type: string
            maxLength: 64
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 365
        never_expires:
          type: boolean
          default: false
        all_projects:
          type: boolean
          default: true
        project_ids:
          type: array
          items:
            type: string

    ApiTokenListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiTokenItem"

    ApiTokenItem:
      type: object
      required:
        [
          id,
          name,
          scopes,
          all_projects,
          project_ids,
          is_active,
          created_at,
          expires_at,
          revoked_at,
          last_used_at,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: integer
          format: int64
        expires_at:
          type: [integer, "null"]
          format: int64
        revoked_at:
          type: [integer, "null"]
          format: int64
        last_used_at:
          type: [integer, "null"]
          format: int64
        previous_key_expires_at:
          type: [integer, "null"]
          format: int64

    CreateApiTokenResponse:
      type: object
      required: [id, name, token, scopes, all_projects, project_ids, expires_at, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        token:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        expires_at:
          type: [integer, "null"]
          format: int64
        created_at:
          type: integer
          format: int64

    UpdateApiTokenDto:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        scopes:
          type: array
          items:
            type: string
            maxLength: 64
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 365
        never_expires:
          type: boolean
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string

    UpdateApiTokenResponse:
      type: object
      required: [id, name, scopes, all_projects, project_ids, expires_at, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        expires_at:
          type: [integer, "null"]
          format: int64
        created_at:
          type: integer
          format: int64

    RotateApiTokenDto:
      type: object
      properties:
        grace_period_minutes:
          type: integer
          minimum: 0
          maximum: 10080

    RotateApiTokenResponse:
      type: object
      required: [id, token, grace_period_minutes, previous_key_expires_at]
      properties:
        id:
          type: string
        token:
          type: string
        grace_period_minutes:
          type: integer
        previous_key_expires_at:
          type: [integer, "null"]
          format: int64

    ListApiScopesResponse:
      type: object
      required: [data, default]
      properties:
        data:
          type: array
          items:
            type: string
          description: 所有可用的 API 作用域列表
        default:
          type: array
          items:
            type: string
          description: 创建 Token 时的默认作用域

    CreateProjectDto:
      type: object
      required: [project_key, name]
      properties:
        project_key:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 128
        repo_url:
          type: string
          maxLength: 512
        description:
          type: string
          maxLength: 2048
        author:
          type: string
          maxLength: 128
        author_homepage_url:
          type: string
          format: uri
          maxLength: 512
        icon_url:
          type: string
          format: uri
          maxLength: 1024
        website_url:
          type: string
          format: uri
          maxLength: 512
        docs_url:
          type: string
          format: uri
          maxLength: 512
        published_at:
          type: integer
          format: int64
        optional_update_min_comparable_version:
          type: string
          maxLength: 64
          description: 项目级可选更新范围下限（可比较版本号）
        optional_update_max_comparable_version:
          type: string
          maxLength: 64
          description: 项目级可选更新范围上限（可比较版本号）
        stats_retention_days:
          type: integer
          minimum: 1
          maximum: 365
          default: 365
          description: 接口请求统计保留时长（天），超出部分每日自动清理
      example:
        project_key: verhub
        name: Verhub
        repo_url: https://github.com/example/verhub
        description: 版本与公告管理
        author: octocat
        author_homepage_url: https://github.com/octocat
