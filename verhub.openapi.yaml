components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: 版本创建接口支持 API Key 认证

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    ProjectIdById:
      name: id
      in: path
      required: true
      schema:
        type: string
    EntityId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProjectKey:
      name: projectKey
      in: path
      required: true
      schema:
        type: string
    StartTime:
      name: start_time
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Unix 时间戳（毫秒）
    EndTime:
      name: end_time
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Unix 时间戳（毫秒）
    LogLevel:
      name: level
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 3
      description: 0=debug, 1=info, 2=warn, 3=error

  responses:
    Unauthorized:
      description: 未认证或令牌非法
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ModuleStatusResponse:
      type: object
      required: [module, implemented]
      properties:
        module:
          type: string
        implemented:
          type: boolean

    DeleteSuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string

    LoginDto:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 64
        password:
          type: string
          minLength: 6
          maxLength: 128

    LoginResponse:
      type: object
      required: [access_token, expires_in, user]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          description: JWT 剩余秒数
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, username, role, must_change_password]
      properties:
        id:
          type: string
        username:
          type: string
          maxLength: 64
        role:
          type: string
          enum: [ADMIN]
        must_change_password:
          type: boolean

    AdminProfileResponse:
      $ref: "#/components/schemas/AuthUser"

    UpdateAdminProfileDto:
      type: object
      required: [current_password]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        username:
          type: string
          maxLength: 64
        new_password:
          type: string
          minLength: 6
          maxLength: 128

    ChangePasswordDto:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        new_password:
          type: string
          minLength: 6
          maxLength: 128

    UpdateAdminAccountDto:
      type: object
      required: [current_password, username]
      properties:
        current_password:
          type: string
          minLength: 6
          maxLength: 128
        username:
          type: string
          maxLength: 64

    CreateApiTokenDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64
        scopes:
          type: array
          items:
            type: string
            maxLength: 64
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 365
        never_expires:
          type: boolean
          default: false
        all_projects:
          type: boolean
          default: true
        project_ids:
          type: array
          items:
            type: string

    ApiTokenListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiTokenItem"

    ApiTokenItem:
      type: object
      required:
        [
          id,
          name,
          scopes,
          all_projects,
          project_ids,
          is_active,
          created_at,
          expires_at,
          revoked_at,
          last_used_at,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: [string, "null"]
          format: date-time
        revoked_at:
          type: [string, "null"]
          format: date-time
        last_used_at:
          type: [string, "null"]
          format: date-time
        previous_key_expires_at:
          type: [string, "null"]
          format: date-time

    CreateApiTokenResponse:
      type: object
      required: [id, name, token, scopes, all_projects, project_ids, expires_at, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        token:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        expires_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time

    UpdateApiTokenDto:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        scopes:
          type: array
          items:
            type: string
            maxLength: 64
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 365
        never_expires:
          type: boolean
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string

    UpdateApiTokenResponse:
      type: object
      required: [id, name, scopes, all_projects, project_ids, expires_at, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        all_projects:
          type: boolean
        project_ids:
          type: array
          items:
            type: string
        expires_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time

    RotateApiTokenDto:
      type: object
      properties:
        grace_period_minutes:
          type: integer
          minimum: 0
          maximum: 10080

    RotateApiTokenResponse:
      type: object
      required: [id, token, grace_period_minutes, previous_key_expires_at]
      properties:
        id:
          type: string
        token:
          type: string
        grace_period_minutes:
          type: integer
        previous_key_expires_at:
          type: [string, "null"]
          format: date-time

    ListApiScopesResponse:
      type: object
      required: [data, default]
      properties:
        data:
          type: array
          items:
            type: string
          description: 所有可用的 API 作用域列表
        default:
          type: array
          items:
            type: string
          description: 创建 Token 时的默认作用域

    CreateProjectDto:
      type: object
      required: [project_key, name]
      properties:
        project_key:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 128
        repo_url:
          type: string
          maxLength: 512
        description:
          type: string
          maxLength: 2048

    UpdateProjectDto:
      type: object
      properties:
        project_key:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 128
        repo_url:
          type: string
          maxLength: 512
        description:
          type: string
          maxLength: 2048

    ProjectItem:
      type: object
      required: [id, project_key, name, repo_url, description, created_at, updated_at]
      properties:
        id:
          type: string
        project_key:
          type: string
        name:
          type: string
        repo_url:
          type: [string, "null"]
        description:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectListResponse:
      type: object
      required: [total, data]
      properties:
        total:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectItem"

    ClientPlatform:
      type: string
      enum: [ios, android, windows, mac, web]

    CreateVersionDto:
      type: object
      required: [version, download_url]
      properties:
        version:
          type: string
          maxLength: 64
        title:
          type: string
          maxLength: 128
        content:
          type: string
          maxLength: 4096
        download_url:
          type: string
          maxLength: 2048
        forced:
          type: boolean
        platform:
          $ref: "#/components/schemas/ClientPlatform"
        custom_data:
          type: object
          additionalProperties: true

    CreateProjectVersionDto:
      allOf:
        - $ref: "#/components/schemas/CreateVersionDto"
        - type: object
          required: [project_key]
          properties:
            project_key:
              type: string
              maxLength: 64

    UpdateVersionDto:
      type: object
      properties:
        version:
          type: string
          maxLength: 64
        title:
          type: string
          maxLength: 128
        content:
          type: string
          maxLength: 4096
        download_url:
          type: string
          maxLength: 2048
        forced:
          type: boolean
        platform:
          $ref: "#/components/schemas/ClientPlatform"
        custom_data:
          type: object
          additionalProperties: true

    VersionItem:
      type: object
      required:
        [id, version, title, content, download_url, forced, platform, custom_data, created_at]
      properties:
        id:
