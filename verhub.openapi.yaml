openapi: 3.1.0
info:
  title: Verhub API
  version: 1.2.0
  description: |
    Verhub 后端接口契约（与当前 NestJS Controller + DTO 保持一致）。
    基础路径统一为 /api/v1。

servers:
  - url: /api/v1
    description: 默认 API 前缀

tags:
  - name: Health
  - name: Auth
  - name: Projects
  - name: Versions
  - name: Announcements
  - name: Feedbacks
  - name: Logs

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "201":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/status:
    get:
      tags: [Auth]
      summary: Auth 模块状态
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前管理员信息
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/admin-profile:
    get:
      tags: [Auth]
      summary: 获取管理员资料
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: 更新管理员资料
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminProfileDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password:
    patch:
      tags: [Auth]
      summary: 修改管理员密码
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/account:
    patch:
      tags: [Auth]
      summary: 修改管理员账号（用户名）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminAccountDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: 用户名冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-scopes:
    get:
      tags: [Auth]
      summary: 获取可用的 API 作用域列表
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 获取可用作用域列表及默认值
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApiScopesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/tokens:
    get:
      tags: [Auth]
      summary: 获取长期 Token 列表
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiTokenItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: 创建长期 Token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/api-keys:
    get:
      tags: [Auth]
      summary: 获取长期 Token 列表（包装响应）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokenListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: 创建长期 Token（包装响应）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/tokens/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [Auth]
      summary: 在线更新长期 Token（权限/范围/有效期，token 值不变）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiTokenDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Auth]
      summary: 撤销长期 Token
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/tokens/{id}/rotate:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [Auth]
      summary: 轮转长期 Token（支持旧 token 宽限期）
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    patch:
      tags: [Auth]
      summary: 在线更新长期 Token（包装响应，token 值不变）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiTokenDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Auth]
      summary: 撤销长期 Token（包装响应）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/api-keys/{id}/rotate:
    parameters:
      - $ref: "#/components/parameters/EntityId"
    post:
      tags: [Auth]
      summary: 轮转长期 Token（包装响应，支持旧 token 宽限期）
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateApiTokenDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateApiTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects:
    get:
      tags: [Projects]
      summary: 获取项目列表
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: 创建项目
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: project_key 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/statistics:
    get:
      tags: [Projects]
      summary: 获取项目统计信息
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectIdById"
    get:
      tags: [Projects]
      summary: 获取单个项目
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: 更新项目
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: project_key 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Projects]
      summary: 删除项目
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/_status:
    get:
      tags: [Projects]
      summary: Projects 模块状态
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/{projectId}/versions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Versions]
      summary: 获取版本列表
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Versions]
      summary: 创建版本（支持管理员 JWT 或 API Key）
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 同项目 version 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/{projectId}/versions/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Versions]
      summary: 获取单个版本
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Versions]
      summary: 更新版本
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVersionDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 同项目 version 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Versions]
      summary: 删除版本
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectId}/versions/_status:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Versions]
      summary: Versions 模块状态
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/versions:
    post:
      tags: [Versions]
      summary: 通过 project_key 创建版本（兼容路径）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectVersionDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/versions/{version_id}:
    parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Versions]
      summary: 按版本ID获取版本（兼容路径）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Versions]
      summary: 按版本ID更新版本（兼容路径）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVersionDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 同项目 version 冲突
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Versions]
      summary: 按版本ID删除版本（兼容路径）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/versions/statistics:
    get:
      tags: [Versions]
      summary: 获取版本统计信息
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required:
                  [
                    total_versions,
                    total_projects,
                    forced_versions,
                    latest_version_time,
                    first_version_time,
                  ]
                properties:
                  total_versions:
                    type: integer
                  total_projects:
                    type: integer
                  forced_versions:
                    type: integer
                  latest_version_time:
                    type: [integer, "null"]
                  first_version_time:
                    type: [integer, "null"]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/{projectId}/announcements:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Announcements]
      summary: 获取公告列表
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Announcements]
      summary: 创建公告
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectId}/announcements/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/EntityId"
    get:
      tags: [Announcements]
      summary: 获取单条公告
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Announcements]
      summary: 更新公告
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Announcements]
      summary: 删除公告
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/projects/{projectId}/announcements/_status:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Announcements]
      summary: Announcements 模块状态
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/projects/announcements:
    post:
      tags: [Announcements]
      summary: 通过 project_key 创建公告（兼容路径）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectAnnouncementDto"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/announcements/{announcement_id}:
    parameters:
      - name: announcement_id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Announcements]
      summary: 按公告ID更新公告（兼容路径）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementDto"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Announcements]
      summary: 按公告ID删除公告（兼容路径）
      security:
        - BearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/announcements/statistics:
    get:
      tags: [Announcements]
      summary: 获取公告统计信息
      security:
        - BearerAuth: []
